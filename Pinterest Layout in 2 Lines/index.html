<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masonry Layout</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="masonry">
      <div class="item" style="height: 200px; background: #e74c3c"></div>
      <div class="item" style="height: 300px; background: #3498db"></div>
      <div class="item" style="height: 150px; background: #2ecc71"></div>
      <div class="item" style="height: 250px; background: #f1c40f"></div>
      <div class="item" style="height: 180px; background: #9b59b6"></div>
      <div class="item" style="height: 220px; background: #1abc9c"></div>
      <div class="item" style="height: 160px; background: #e67e22"></div>
    </div>
  </body>
</html>
