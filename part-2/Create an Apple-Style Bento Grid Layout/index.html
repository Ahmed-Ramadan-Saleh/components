<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bento Grid</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bento-grid">
      <div class="card hero">
        <h3>Welcome Back</h3>
        <p>Dashboard Overview</p>
      </div>

      <div class="card tall">
        <h3>Analytics</h3>
        <p>Chart goes here</p>
      </div>

      <div class="card wide">
        <h3>Recent Activity</h3>
        <p>Scrollable list...</p>
      </div>

      <div class="card">
        <h3>Users</h3>
        <p>+15%</p>
      </div>

      <div class="card">
        <h3>Sales</h3>
        <p>$4.2k</p>
      </div>

      <div class="card wide">
        <h3>Map View</h3>
        <p>Geolocation data</p>
      </div>
    </div>
  </body>
</html>
